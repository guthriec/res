name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Preflight npm auth diagnostics
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "registry: $(npm config get registry)"
          echo "NODE_AUTH_TOKEN is ${NODE_AUTH_TOKEN:+set}${NODE_AUTH_TOKEN:-unset}"
          echo "NPM_TOKEN is ${NPM_TOKEN:+set}${NPM_TOKEN:-unset}"
          npm config get //registry.npmjs.org/:_authToken || true
          npm config list -l | grep -iE 'auth|registry' || true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
        run: |
          npm config delete //registry.npmjs.org/:_authToken || true
          npm config delete _authToken || true
          npm publish --provenance --access public
